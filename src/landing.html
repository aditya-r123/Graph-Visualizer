<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Graph Visualizer — Welcome</title>
    <link rel="icon" type="image/png" href="/logo.png">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #0f172a 0%, #111827 100%);
            color: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            max-width: 900px;
            padding: 40px 24px;
            text-align: center;
        }
        .logo {
            width: 72px;
            height: 72px;
        }
        h1 {
            margin: 16px 0 8px;
            font-size: 2.25rem;
            line-height: 1.2;
            letter-spacing: 0.2px;
        }
        p {
            margin: 0 auto 24px;
            max-width: 720px;
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.6;
        }
        .card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid rgba(148, 163, 184, 0.15);
            border-radius: 16px;
            padding: 24px;
            margin: 24px auto;
        }
        .cta {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #6366f1;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 12px 18px;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.06s ease, box-shadow 0.2s ease;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.35);
        }
        .cta:hover { transform: translateY(-1px); }
        .cta:active { transform: translateY(0); }
        .subtext { color: #94a3b8; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="/logo.png" alt="Graph Visualizer" />
        <h1>Graph Visualizer</h1>
        <p>Design, visualize, and analyze graphs with an intuitive, high‑performance editor. Create vertices and edges, run algorithms like BFS and DFS, and export your work — all in one place.</p>
        <div class="card">
            <a class="cta" href="/editor" id="enterEditorBtn">
                <span>Enter Editor</span>
                <span aria-hidden="true">→</span>
            </a>
            <div class="subtext" style="margin-top: 10px;">No sign‑in required. Your canvases are saved locally.</div>
        </div>
    </div>
    <!-- Minimal script hook if needed later -->
    <script src="landing.js"></script>
    
</body>
</html>
